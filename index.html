<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wine Cellar</title>
    
    <style>
        /* DESIGN TOKENS */
        :root {
            --lumon-blue: #005a84;
            --lumon-bg: #e2e8f0;
            --lumon-text: #1a202c;
            --lumon-border: #cbd5e0;
            --plasma-amber: #ffb800;
            --font-main: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center; 
            height: 100vh; 
            background-color: #181818; 
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        canvas { 
            display: block; 
            width: 100% !important;
            height: auto !important;
        }

        /* UI INSTRUCTIONS OVERLAY */
        .instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--lumon-text);
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border: 1px solid var(--lumon-border);
            font-size: 11px;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            line-height: 1.6;
            pointer-events: none;
            transition: opacity 1s ease, transform 1s ease;
        }

        .instructions b {
            color: var(--lumon-blue);
            display: block;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .instructions.hidden {
            opacity: 0;
            transform: translateX(-20px);
        }

        /* UI BOTTLE DATA POPUP */
        .bottle-info {
            position: fixed;
            bottom: 0; /* Desktop Default */
            left: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.95);
            color: var(--plasma-amber);
            padding: 15px 25px;
            border-top: 1px solid #333;
            z-index: 100;
            display: none;
            box-sizing: border-box;
            font-family: var(--font-mono);
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Hover Activation State */
        .bottle-info.active {
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: lumonFade 0.2s ease-out forwards;
        }

        #bottleInfo strong {
            font-size: 10px;
            color: #888;
            margin-right: 5px;
            font-weight: 800;
        }

        .data-value {
            font-size: 14px;
            font-weight: 400;
            color: var(--plasma-amber);
            margin-right: 20px;
        }

        @keyframes lumonFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .bottle-info {
                top: 0; /* move to top on mobile */
                bottom: auto;
                padding: 10px;
                font-size: 10px;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                background: #111;
                border-top: none;
                border-bottom: 1px solid #333;
            }

            .data-value {
                margin-right: 10px;
                font-size: 11px;
            }

            /* instructions centered for mobile */
            .instructions {
                top: 60px; /* Offset from info bar */
                left: 10px;
                right: 10px;
                padding: 10px;
            }

            /* lil-gui Mobile */
            .lil-gui.root {
                position: fixed !important;
                top: auto !important;
                bottom: 0 !important;
                right: 0 !important;
                width: 100% !important;
                max-height: 40vh;
                overflow-y: auto;
                border-top: 2px solid var(--lumon-blue);
            }

            .lil-gui .controller {
                height: 45px !important;
                margin: 5px 0 !important;
            }

            .lil-gui .name {
                font-size: 14px !important;
                font-weight: 600;
            }

            .lil-gui .widget input, 
            .lil-gui .widget button {
                height: 35px !important;
                font-size: 16px !important;
            }
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div class="instructions">
        <b>Input Commands</b>
        Rotate: Mouse Left + Drag<br>
        Translate: Mouse Right + Drag<br>
        Scale: Scroll Wheel<br>
    </div>

    <div class="bottle-info" id="bottleInfo"></div>

    <script type="module" src="./script2.js"></script>

    <script>
        // hide tooltip
        window.addEventListener('load', () => {
            const tooltip = document.querySelector('.instructions');
            if (tooltip) {
                setTimeout(() => {
                    tooltip.classList.add('hidden');
                }, 5000);
            }
        });
    </script>
</body>
</html>
